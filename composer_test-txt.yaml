  jupyterhub:
    image: jupyterhub/jupyterhub:latest
    container_name: jupyterhub
    ports:
      - "8000:8000"
    volumes:
      - ./jupyterhub/jupyterhub_config.py:/srv/jupyterhub/jupyterhub_config.py
      - ./work:/home/jupyterhub/work
    networks:
      - spark-network
    environment:
      - JUPYTERHUB_CRYPT_KEY=supersecretkey
    deploy:
      resources:
        limits:
          memory: 2g

