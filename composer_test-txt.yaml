      - SPARK_MODE=worker
      - SPARK_MASTER_URL=spark://spark-master:7077
      - SPARK_WORKER_MEMORY=2g
      - SPARK_WORKER_CORES=2
    networks:
      - spark-network
    volumes:
      - ./jars:/opt/spark/jars  
    deploy: 
      resources: 
        limits: 
          memory: 2g

