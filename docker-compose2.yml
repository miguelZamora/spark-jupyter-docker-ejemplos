#version: '3.8'

services:
  jupyterhub:
    image: jupyterhub/jupyterhub:latest
    container_name: jupyterhub
    ports:
      - "8000:8000"
    volumes:
      - ./config/jupyterhub_config.py:/srv/jupyterhub/jupyterhub_config.py
      - ./work:/home/jupyterhub/work
    networks:
      - spark-network
    environment:
      - JUPYTERHUB_CRYPT_KEY=supersecretkey
    deploy:
      resources:
        limits:
          memory: 2g
    restart: unless-stopped
  
  postgres:
    image: postgres:latest
    container_name: postgresdb_cachoza
    environment:
      POSTGRES_USER: cachoza_user
      POSTGRES_PASSWORD: cachoza_password
      POSTGRES_DB: psqldbSpark
    ports:
      - "5432:5432"
    networks:
      - spark-network
    deploy: 
      resources: 
        limits: 
          memory: 1g
    restart: unless-stopped

  # Usar la imagen oficial de Spark de Bitnami (garantizada)
  spark-master:
    image: bitnami/spark:3.5.1
    container_name: spark-master
    user: root
    environment:
      - SPARK_MODE=master
      - SPARK_MASTER_HOST=spark-master
      - SPARK_MASTER_PORT=7077
      - SPARK_MASTER_WEBUI_PORT=8080
    ports:
      - "7077:7077"
      - "8080:8080"
    networks:
      - spark-network
    volumes:
      - ./jars:/opt/bitnami/spark/jars
    deploy:
      resources:
        limits:
          memory: 2g
    restart: unless-stopped

  spark-worker-1:
    image: bitnami/spark:3.5.1
    container_name: spark-worker-1
    user: root
    environment:
      - SPARK_MODE=worker
      - SPARK_MASTER_URL=spark://spark-master:7077
      - SPARK_WORKER_MEMORY=2g
      - SPARK_WORKER_CORES=2
    depends_on:
      - spark-master
    networks:
      - spark-network
    volumes:
      - ./jars:/opt/bitnami/spark/jars
    deploy:
      resources:
        limits:
          memory: 2g
    restart: unless-stopped

  spark-worker-2:
    image: bitnami/spark:3.5.1
    container_name: spark-worker-2
    user: root
    environment:
      - SPARK_MODE=worker
      - SPARK_MASTER_URL=spark://spark-master:7077
      - SPARK_WORKER_MEMORY=2g
      - SPARK_WORKER_CORES=2
    depends_on:
      - spark-master
    networks:
      - spark-network
    volumes:
      - ./jars:/opt/bitnami/spark/jars
    deploy:
      resources:
        limits:
          memory: 2g
    restart: unless-stopped

networks:
  spark-network:
    driver: bridge