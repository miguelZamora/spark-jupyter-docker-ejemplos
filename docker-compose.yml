#version: '3'
services:
  jupyter:
    image: jupyter/pyspark-notebook
    container_name: jupyter
    ports:
      - "8888:8888"
    volumes:
      - ./work:/home/jovyan/work
    environment:
      - GRANT_SUDO=yes
      - JUPYTER_ENABLE_LAB=yes
    networks:
      - spark-network

  postgres:
    image: postgres:latest
    container_name: postgresdb_cachoza
    environment:
      POSTGRES_USER: cachoza_user
      POSTGRES_PASSWORD: cachoza_password
      POSTGRES_DB: psqldbSpark
    ports:
      - "5432:5432"
    networks:
      - spark-network

  spark-master:
    image: bitnami/spark:3.5.0
    container_name: spark-master
    command: ["/opt/bitnami/scripts/spark/run.sh"]
    environment:
      - SPARK_MODE=master
    ports:
      - "7077:7077"
      - "8080:8080"
    networks:
      - spark-network
    volumes:
      - ./jars:/opt/spark/jars

  spark-worker-1:
    image: bitnami/spark:3.5.0
    container_name: spark-worker-1
    command: ["/opt/bitnami/scripts/spark/run.sh"]
    environment:
      - SPARK_MODE=worker
      - SPARK_MASTER_URL=spark://spark-master:7077
      - SPARK_WORKER_MEMORY=2g
      - SPARK_WORKER_CORES=2
    networks:
      - spark-network
    volumes:
      - ./jars:/opt/spark/jars


  spark-worker-2:
    image: bitnami/spark:3.5.0
    container_name: spark-worker-2
    command: ["/opt/bitnami/scripts/spark/run.sh"]
    environment:
      - SPARK_MODE=worker
      - SPARK_MASTER_URL=spark://spark-master:7077
      - SPARK_WORKER_MEMORY=2g
      - SPARK_WORKER_CORES=2
    networks:
      - spark-network
    volumes:
      - ./jars:/opt/spark/jars  

  spark-worker-3:
    image: bitnami/spark:3.5.0
    container_name: spark-worker-3
    command: ["/opt/bitnami/scripts/spark/run.sh"]
    environment:
      - SPARK_MODE=worker
      - SPARK_MASTER_URL=spark://spark-master:7077
      - SPARK_WORKER_MEMORY=2g
      - SPARK_WORKER_CORES=2
    networks:
      - spark-network
    volumes:
      - ./jars:/opt/spark/jars  

networks:
  spark-network:
    driver: bridge
